# nginx server config — dr-ehrlichmann.de (static Astro + /api form backend)
# ----------------------------------------------------------------------------
# Goals: serve the static build with URLs 1:1 and NO trailing slash
# (Astro trailingSlash:'never' + build.format:'file' => /leistungen.html),
# canonical https://dr-ehrlichmann.de (no www), Permissions-Policy for WebMCP,
# gzip, long-cache for assets, and proxy /api/* to the Node form service.
#
# Install: copy to /etc/nginx/sites-available/dr-ehrlichmann.de
#          ln -s ../sites-available/dr-ehrlichmann.de /etc/nginx/sites-enabled/
#          then run `sudo certbot --nginx -d dr-ehrlichmann.de -d www.dr-ehrlichmann.de`
#          (certbot fills in the ssl_certificate lines automatically).
# Webroot (the contents of the Astro `dist/`): /var/www/dr-ehrlichmann.de

# ---- 1) HTTP :80 — ACME challenge + redirect everything to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name dr-ehrlichmann.de www.dr-ehrlichmann.de;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { return 301 https://dr-ehrlichmann.de$request_uri; }
}

# ---- 2) HTTPS :443 www -> non-www canonical redirect ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.dr-ehrlichmann.de;

    # certbot will manage these (same cert covers both names):
    ssl_certificate     /etc/letsencrypt/live/dr-ehrlichmann.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dr-ehrlichmann.de/privkey.pem;

    return 301 https://dr-ehrlichmann.de$request_uri;
}

# ---- 3) HTTPS :443 — the site ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dr-ehrlichmann.de;

    root /var/www/dr-ehrlichmann.de;
    index index.html;
    charset utf-8;

    ssl_certificate     /etc/letsencrypt/live/dr-ehrlichmann.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dr-ehrlichmann.de/privkey.pem;

    # --- security / agent headers (always sent) ---
    add_header Permissions-Policy "tools=(self)" always;   # WebMCP (agent-ready)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Optional strict CSP — TEST before enabling (the site is 0-external; consent
    # embeds add youtube-nocookie / vimeo / google-maps iframes only after a click):
    # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; connect-src 'self'; frame-src https://www.youtube-nocookie.com https://player.vimeo.com https://maps.google.com https://www.google.com; base-uri 'self'; form-action 'self'" always;

    # --- gzip (brotli optional, needs ngx_brotli module) ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml text/xml application/manifest+json;

    # --- form backend (Node service on 127.0.0.1:8787) ---
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 20s;
    }

    # --- long-cache immutable assets (hashed by Astro / static uploads) ---
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location /wp-content/uploads/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
    location ~* \.(?:css|js|woff2?|ttf|otf|svg|png|jpe?g|webp|gif|ico|mp3|pdf)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # --- enforce NO trailing slash (canonical URLs), except root ---
    rewrite ^/(.+)/$ /$1 permanent;

    # --- pages: /leistungen -> /leistungen.html ; /admin -> /admin/index.html ---
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # custom 404 (Astro builds dist/404.html)
    error_page 404 /404.html;
    location = /404.html { internal; }

    # don't serve dotfiles / submission backups etc.
    location ~ /\. { deny all; }
}
