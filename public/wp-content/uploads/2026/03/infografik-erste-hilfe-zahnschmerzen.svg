<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: Arial, Helvetica, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2C3E50; }
  .ts { font-size: 12px; font-weight: 400; fill: #5A6A7A; }
  .arr { stroke: #94A3B8; stroke-width: 1.5; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #E2E8F0; }
    .ts { fill: #94A3B8; }
    .arr { stroke: #64748B; }
  }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" /></marker>
</defs>

<text class="th" x="340" y="28" text-anchor="middle">Erste Hilfe bei Zahnschmerzen im Urlaub</text>

<!-- Start -->
<rect x="220" y="50" width="240" height="44" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5" />
<text class="th" x="340" y="72" text-anchor="middle" dominant-baseline="central" style="fill:#712B13">Zahnschmerzen im Urlaub</text>

<line x1="340" y1="94" x2="340" y2="118" class="arr" marker-end="url(#arrow)" />

<!-- Step 1 -->
<rect x="170" y="118" width="340" height="44" rx="8" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5" />
<text class="th" x="340" y="140" text-anchor="middle" dominant-baseline="central" style="fill:#633806">Ruhe bewahren und Schmerz einschätzen</text>

<line x1="185" y1="162" x2="185" y2="188" class="arr" marker-end="url(#arrow)" />
<line x1="495" y1="162" x2="495" y2="188" class="arr" marker-end="url(#arrow)" />

<!-- Branch: leichte Schmerzen -->
<rect x="42" y="188" width="286" height="80" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5" />
<text class="th" x="185" y="210" text-anchor="middle" dominant-baseline="central" style="fill:#085041">Leichte Schmerzen</text>
<text class="ts" x="185" y="230" text-anchor="middle" dominant-baseline="central" style="fill:#0F6E56">Kühlen (feuchtes Tuch)</text>
<text class="ts" x="185" y="248" text-anchor="middle" dominant-baseline="central" style="fill:#0F6E56">Schmerzmittel nehmen</text>

<!-- Branch: starke Schmerzen -->
<rect x="352" y="188" width="286" height="80" rx="8" fill="#FCEBEB" stroke="#F09595" stroke-width="0.5" />
<text class="th" x="495" y="210" text-anchor="middle" dominant-baseline="central" style="fill:#791F1F">Starke Schmerzen</text>
<text class="ts" x="495" y="230" text-anchor="middle" dominant-baseline="central" style="fill:#A32D2D">Schwellung, Fieber</text>
<text class="ts" x="495" y="248" text-anchor="middle" dominant-baseline="central" style="fill:#A32D2D">Zahnunfall, Blutung</text>

<line x1="185" y1="268" x2="185" y2="296" class="arr" marker-end="url(#arrow)" />
<line x1="495" y1="268" x2="495" y2="296" class="arr" marker-end="url(#arrow)" />

<!-- Detail: Selbsthilfe -->
<rect x="42" y="296" width="286" height="100" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5" />
<text class="th" x="185" y="318" text-anchor="middle" dominant-baseline="central" style="fill:#085041">Selbsthilfe</text>
<text class="ts" x="60" y="340" dominant-baseline="central" style="fill:#0F6E56">· Kaffee, Alkohol, Sonne meiden</text>
<text class="ts" x="60" y="358" dominant-baseline="central" style="fill:#0F6E56">· Salbei-/Kamillentee-Spülung</text>
<text class="ts" x="60" y="376" dominant-baseline="central" style="fill:#0F6E56">· Nelkenöl auf betroffene Stelle</text>

<!-- Detail: Zahnarzt -->
<rect x="352" y="296" width="286" height="100" rx="8" fill="#FCEBEB" stroke="#F09595" stroke-width="0.5" />
<text class="th" x="495" y="318" text-anchor="middle" dominant-baseline="central" style="fill:#791F1F">Sofort zum Zahnarzt</text>
<text class="ts" x="370" y="340" dominant-baseline="central" style="fill:#A32D2D">· Hotel / Reiseleitung fragen</text>
<text class="ts" x="370" y="358" dominant-baseline="central" style="fill:#A32D2D">· Apotheke / Touristinfo</text>
<text class="ts" x="370" y="376" dominant-baseline="central" style="fill:#A32D2D">· Krankenkassen-Hotline</text>

<line x1="185" y1="396" x2="185" y2="424" class="arr" marker-end="url(#arrow)" />
<line x1="495" y1="396" x2="495" y2="424" class="arr" marker-end="url(#arrow)" />

<!-- Bottom boxes -->
<rect x="42" y="424" width="286" height="56" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5" />
<text class="th" x="185" y="446" text-anchor="middle" dominant-baseline="central" style="fill:#444441">Besserung?</text>
<text class="ts" x="185" y="464" text-anchor="middle" dominant-baseline="central" style="fill:#5F5E5A">Zu Hause Zahnarzt aufsuchen</text>

<rect x="352" y="424" width="286" height="56" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5" />
<text class="th" x="495" y="446" text-anchor="middle" dominant-baseline="central" style="fill:#444441">Rechnung aufbewahren!</text>
<text class="ts" x="495" y="464" text-anchor="middle" dominant-baseline="central" style="fill:#5F5E5A">Auf Deutsch oder Englisch</text>

<text class="ts" x="340" y="520" text-anchor="middle" style="font-style:italic">Wichtig: Bei Verschlechterung immer einen Zahnarzt vor Ort aufsuchen</text>
</svg>
